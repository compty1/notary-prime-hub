name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate baseline snapshots and commit them back to the branch"
        type: boolean
        default: false

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # so the snapshot-bootstrap step can push baseline PNGs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright + system deps
        run: bunx playwright install --with-deps chromium

      # Bootstrap baselines on the very first run (or when manually requested).
      # When no PNGs exist yet under tests/visual/landing-snapshots.spec.ts-snapshots/,
      # we generate them and push them back to the branch so subsequent runs compare.
      - name: Detect missing baselines
        id: baselines
        run: |
          if [ -z "$(ls -A tests/visual/landing-snapshots.spec.ts-snapshots 2>/dev/null)" ] || [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate baselines (first run / manual)
        if: steps.baselines.outputs.missing == 'true'
        run: bunx playwright test --update-snapshots --reporter=list

      - name: Commit new baselines
        if: steps.baselines.outputs.missing == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual/landing-snapshots.spec.ts-snapshots
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(visual): bootstrap landing-route snapshots [skip ci]"
            git push
          fi

      - name: Run visual regression
        if: steps.baselines.outputs.missing != 'true'
        run: bunx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
