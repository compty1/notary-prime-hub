name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate baseline snapshots and commit them back to the branch"
        type: boolean
        default: false

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write       # bootstrap/regenerate baselines push
      pull-requests: write  # post diff summary as PR comment
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright + system deps
        run: bunx playwright install --with-deps chromium

      # Bootstrap baselines on the very first run (or when manually requested).
      # We treat each snapshot dir that contains *no PNG files* (only .gitkeep
      # bootstrap markers) as "missing" so the workflow regenerates baselines.
      - name: Detect missing baselines
        id: baselines
        run: |
          missing=false
          for dir in tests/visual/landing-snapshots.spec.ts-snapshots tests/visual/booking-funnel.spec.ts-snapshots; do
            png_count=$(find "$dir" -maxdepth 1 -name '*.png' 2>/dev/null | wc -l)
            if [ "$png_count" = "0" ]; then
              echo "Snapshot dir empty (no PNGs): $dir"
              missing=true
            fi
          done
          if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            missing=true
          fi
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Generate baselines (first run / manual)
        if: steps.baselines.outputs.missing == 'true'
        run: bunx playwright test --update-snapshots --reporter=list

      - name: Commit new baselines
        if: steps.baselines.outputs.missing == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual/landing-snapshots.spec.ts-snapshots tests/visual/booking-funnel.spec.ts-snapshots
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(visual): bootstrap landing + booking-funnel snapshots [skip ci]"
            git push
          fi

      - name: Run visual regression
        id: visual
        if: steps.baselines.outputs.missing != 'true'
        run: bunx playwright test --reporter=list,json
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json

      - name: Build failure summary
        if: steps.visual.conclusion == 'failure' || steps.visual.outcome == 'failure'
        id: summary
        run: |
          set +e
          REPORT=playwright-results.json
          OUT=visual-failures.md
          {
            echo "### 🔴 Visual regression diffs detected"
            echo ""
            echo "| Route | Width | Status |"
            echo "| --- | --- | --- |"
            if [ -f "$REPORT" ]; then
              node -e "
                const r = require('./$REPORT');
                const rows = [];
                const walk = (suite) => {
                  (suite.suites||[]).forEach(walk);
                  (suite.specs||[]).forEach(spec => {
                    spec.tests.forEach(t => {
                      const failed = t.results.some(x => x.status === 'failed' || x.status === 'timedOut');
                      if (failed) {
                        const m = spec.title.match(/^(.+?) @ \w+ \((\d+)px\)$/);
                        const route = m ? m[1] : spec.title;
                        const width = m ? m[2] + 'px' : '—';
                        rows.push(\`| \${route} | \${width} | ❌ failed |\`);
                      }
                    });
                  });
                };
                walk(r);
                console.log(rows.join('\n'));
              " >> "$OUT"
            else
              echo "| (results file missing) | — | ❌ |" >> "$OUT"
            fi
            echo ""
            echo "📦 **Diff artifact:** [\`playwright-report\`](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts) — open \`test-results/**/*-diff.png\` to see what shifted."
            echo ""
            echo "🔁 To regenerate baselines: run **Actions → Visual Regression → Run workflow** with **update_snapshots** checked, or run \`bun run snapshots:regenerate\` locally."
          } > "$OUT"
          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"
          echo "body_file=$OUT" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: (steps.visual.conclusion == 'failure' || steps.visual.outcome == 'failure') && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: visual-regression
          path: visual-failures.md

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
            playwright-results.json
          retention-days: 14

      - name: Fail job if visual diffs detected
        if: steps.visual.conclusion == 'failure' || steps.visual.outcome == 'failure'
        run: exit 1
