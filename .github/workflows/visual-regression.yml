name: Visual Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate baseline snapshots and commit them back to the branch"
        type: boolean
        default: false

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # so the snapshot-bootstrap step can push baseline PNGs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright + system deps
        run: bunx playwright install --with-deps chromium

      # Bootstrap baselines on the very first run (or when manually requested).
      # We treat each snapshot dir that contains *no PNG files* (only .gitkeep
      # bootstrap markers) as "missing" so the workflow regenerates baselines.
      - name: Detect missing baselines
        id: baselines
        run: |
          missing=false
          for dir in tests/visual/landing-snapshots.spec.ts-snapshots tests/visual/booking-funnel.spec.ts-snapshots; do
            png_count=$(find "$dir" -maxdepth 1 -name '*.png' 2>/dev/null | wc -l)
            if [ "$png_count" = "0" ]; then
              echo "Snapshot dir empty (no PNGs): $dir"
              missing=true
            fi
          done
          if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            missing=true
          fi
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Generate baselines (first run / manual)
        if: steps.baselines.outputs.missing == 'true'
        run: bunx playwright test --update-snapshots --reporter=list

      - name: Commit new baselines
        if: steps.baselines.outputs.missing == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual/landing-snapshots.spec.ts-snapshots tests/visual/booking-funnel.spec.ts-snapshots
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "chore(visual): bootstrap landing + booking-funnel snapshots [skip ci]"
            git push
          fi

      - name: Run visual regression
        if: steps.baselines.outputs.missing != 'true'
        run: bunx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 14
